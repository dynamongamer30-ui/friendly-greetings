<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamon Gamer | VIP Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=JetBrains+Mono:wght@700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        /* ═══════════════════════════════════════════
           BRAND TOKENS — Dynamon Gamer
           aurora-red: #FF4500  aurora-amber: #F59E0B
        ═══════════════════════════════════════════ */
        :root {
            --bg:            #07030A;
            --bg-elev:       #120408;
            --card:          rgba(18, 4, 8, 0.80);
            --glass:         blur(28px) saturate(170%);
            --border:        rgba(245,158,11,0.14);
            --border-hover:  rgba(255,69,0,0.35);
            --red:           #FF4500;
            --amber:         #F59E0B;
            --red-dim:       rgba(255,69,0,0.12);
            --amber-dim:     rgba(245,158,11,0.10);
            --text:          #E8ECFF;
            --muted:         #6B7280;
            --green:         #22c55e;
            --err:           #ef4444;
            --orange:        #f97316;
            --gradient:      linear-gradient(135deg, #FF4500 0%, #F59E0B 100%);
            --glow-red:      0 0 40px -8px rgba(255,69,0,0.55);
            --glow-amber:    0 0 40px -8px rgba(245,158,11,0.45);
        }

        *, *::before, *::after {
            box-sizing: border-box; margin: 0; padding: 0; outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden; padding: 24px 16px;
            cursor: none;
        }

        /* ─── Canvas BG ─── */
        #bgCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* ─── Cursor Glow ─── */
        #cursorGlow {
            position: fixed;
            width: 340px; height: 340px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(255,69,0,0.18) 0%,
                rgba(245,158,11,0.10) 30%,
                transparent 70%);
            transition: opacity 0.3s;
        }
        #cursorDot {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            background: #FF4500;
            box-shadow: 0 0 12px 3px rgba(255,69,0,0.8), 0 0 24px 6px rgba(245,158,11,0.4);
            transition: width 0.15s, height 0.15s;
        }

        /* ─── Aurora Orb (center background piece) ─── */
        #auroraOrb {
            position: fixed;
            width: 520px; height: 520px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 40% 40%,
                rgba(255,69,0,0.13) 0%,
                rgba(245,158,11,0.09) 30%,
                rgba(120,40,180,0.06) 60%,
                transparent 75%);
            animation: auroraOrbPulse 6s ease-in-out infinite;
            filter: blur(2px);
        }
        @keyframes auroraOrbPulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
            33%      { transform: translate(-50%,-50%) scale(1.08) rotate(3deg); opacity: 1; }
            66%      { transform: translate(-50%,-50%) scale(0.95) rotate(-2deg); opacity: 0.9; }
        }

        /* ─── Header ─── */
        .header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeDown 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .header-logo {
            display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 6px;
        }
        .logo-icon {
            width: 38px; height: 38px;
            background: var(--gradient);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--glow-red);
            font-size: 1.1rem; color: #050810;
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 1.55rem;
            letter-spacing: 0.04em;
            background: linear-gradient(110deg, #FF4500 0%, #F59E0B 50%, #FF4500 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: aurora-shimmer 6s linear infinite;
        }
        .header-sub {
            color: var(--muted); font-size: 0.78rem;
            letter-spacing: 0.06em; text-transform: uppercase;
            margin-top: 2px;
        }

        /* ─── Card ─── */
        .generator-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px 24px 26px;
            width: 100%; max-width: 360px;
            text-align: center;
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), var(--glow-red), inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative; overflow: hidden;
            animation: cardRise 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
        }

        /* top-edge glow line */
        .generator-card::before {
            content: '';
            position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, #FF4500 40%, #F59E0B 60%, transparent);
            opacity: 0.7;
        }

        /* card-blobs removed — bg handled by aurora canvas */

        .card-content { position: relative; z-index: 1; }

        /* ─── Section title ─── */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem; font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }
        .section-desc {
            color: var(--muted); font-size: 0.74rem;
            line-height: 1.5; margin-bottom: 14px;
        }

        /* ─── Key Display ─── */
        .key-wrap { position: relative; margin: 16px 0 4px; }
        .key-display {
            background: rgba(255,69,0,0.05);
            border: 1px solid rgba(255,69,0,0.22);
            border-radius: 16px;
            padding: 22px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.45rem; font-weight: 700;
            letter-spacing: 3px;
            color: var(--red);
            transition: all 0.45s cubic-bezier(0.4,0,0.2,1);
            box-shadow: inset 0 0 24px rgba(255,69,0,0.06);
            position: relative; overflow: hidden;
        }
        .key-display.revealed {
            color: var(--green);
            border-color: rgba(34,197,94,0.4);
            box-shadow: inset 0 0 24px rgba(34,197,94,0.06), 0 0 30px rgba(34,197,94,0.18);
            animation: keyReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        /* scanline shimmer on key */
        .key-display::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            animation: keyScan 3s ease-in-out infinite;
        }

        /* ─── Countdown ─── */
        .countdown {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.77rem; font-weight: 700;
            color: var(--amber);
            margin: 8px 0 0;
            padding: 6px 14px;
            border: 1px solid rgba(245,158,11,0.28);
            border-radius: 10px;
            background: rgba(245,158,11,0.07);
            display: none;
            gap: 6px; align-items: center; justify-content: center;
        }
        .countdown.visible { display: inline-flex; }
        .countdown.expired { color: var(--err); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.07); }

        /* ─── Loader line ─── */
        .loader {
            display: none; color: var(--muted);
            font-size: 0.83rem; font-weight: 600;
            margin: 10px 0; align-items: center; justify-content: center; gap: 8px;
        }
        .loader.active { display: flex; }
        .spin-icon { color: var(--red); animation: spin 0.8s linear infinite; }

        /* ─── Turnstile container ─── */
        .cf-turnstile { margin: 14px auto 4px; display: flex; justify-content: center; }

        /* ─── Turnstile SUCCESS overlay ─── */
        .turnstile-success {
            display: none; flex-direction: column; align-items: center;
            gap: 8px; padding: 14px;
            background: rgba(34,197,94,0.06);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 16px;
            margin: 14px 0 4px;
            animation: none;
        }
        .turnstile-success.show {
            display: flex;
            animation: successPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .ts-orb {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34,197,94,0.25) 0%, transparent 70%);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .ts-orb-ring {
            position: absolute; inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--green);
            border-right-color: var(--green);
            animation: orbSpin 1.2s ease-in-out both;
        }
        .ts-orb-ring-2 {
            position: absolute; inset: -8px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-bottom-color: rgba(34,197,94,0.4);
            animation: orbSpin 2s ease-in-out 0.2s both reverse;
        }
        .ts-check { font-size: 1.5rem; color: var(--green); z-index: 1; animation: checkBounce 0.4s 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
        .ts-text { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.76rem; color: var(--green); letter-spacing: 0.06em; text-transform: uppercase; }
        .ts-sub { font-size: 0.72rem; color: var(--muted); }

        /* particles that burst on turnstile pass */
        .ts-particle {
            position: absolute; border-radius: 50%; pointer-events: none;
            animation: tsParticle 0.8s ease-out forwards;
        }

        /* ─── Buttons ─── */
        .btn-main {
            width: 100%; border: none; border-radius: 16px;
            padding: 16px; font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 0.78rem; letter-spacing: 0.08em;
            text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
        }
        .btn-main::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        .btn-main:active::after { background: rgba(255,255,255,0.08); }
        .btn-main:active { transform: scale(0.965); }

        /* btn-generate removed — key auto-generates after turnstile */

        .btn-open-app {
            background: linear-gradient(135deg, #FF4500, #F59E0B);
            color: #05080A;
            margin-top: 12px; display: none;
            box-shadow: 0 0 28px rgba(245,158,11,0.38);
        }
        .btn-open-app:hover { box-shadow: 0 0 40px rgba(245,158,11,0.55); transform: translateY(-1px); }

        /* ripple */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: scale(0); animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none;
        }

        /* ─── Status pill ─── */
        .status-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.65rem; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .status-pill.ok     { background: rgba(34,197,94,0.09);  color: var(--green); border: 1px solid rgba(34,197,94,0.22); }
        .status-pill.warn   { background: rgba(249,115,22,0.09); color: var(--orange); border: 1px solid rgba(249,115,22,0.22); }
        .status-pill.fail   { background: rgba(239,68,68,0.09);  color: var(--err); border: 1px solid rgba(239,68,68,0.22); }

        /* ─── Toast ─── */
        #toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(12,4,8,0.97);
            color: var(--text);
            border: 1px solid rgba(255,69,0,0.25);
            padding: 12px 22px; border-radius: 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 0.72rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 20px rgba(255,69,0,0.1);
            z-index: 200; display: flex; align-items: center; gap: 7px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ─── Skeleton ─── */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,69,0,0.04) 25%, rgba(255,69,0,0.10) 50%, rgba(255,69,0,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 12px;
        }
        .skeleton-key  { height: 76px; margin: 16px 0; }
        .skeleton-btn  { height: 54px; margin-top: 10px; border-radius: 16px; }
        .skeleton-text { height: 13px; margin: 6px auto; }

        /* ─── Blocked card ─── */
        .blocked-icon { font-size: 3rem; margin-bottom: 12px; }
        .blocked-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--err); margin-bottom: 8px; }
        .blocked-msg { color: var(--muted); font-size: 0.85rem; line-height: 1.5; }

        /* ═══ KEYFRAMES ═══ */
        @keyframes fadeDown   { from { opacity:0; transform: translateY(-18px); } to { opacity:1; transform: none; } }
        @keyframes cardRise   { from { opacity:0; transform: translateY(32px) scale(0.97); } to { opacity:1; transform: none; } }
        @keyframes shimmer    { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes spin       { to { transform: rotate(360deg); } }
        @keyframes keyScan    { 0%,100% { left:-100%; } 50% { left:160%; } }
        @keyframes keyReveal  { 0%   { transform: scale(0.96); opacity:0.5; } 60%  { transform: scale(1.03); } 100% { transform: scale(1); opacity:1; } }
        @keyframes rippleAnim { to { transform: scale(4); opacity:0; } }
        @keyframes successPop { from { opacity:0; transform: scale(0.9) translateY(6px); } to { opacity:1; transform: none; } }
        @keyframes orbSpin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes checkBounce{ from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
        @keyframes tsParticle { 0% { transform: translate(0,0) scale(1); opacity:1; } 100% { opacity:0; } }
        @keyframes aurora-shimmer { to { background-position: 200% center; } }
        @keyframes pulseGlow  { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
        @keyframes floatOrb   { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.04); } }
    </style>
</head>

    <script>
    // ═══════════════════════════════════════════════════════════
    // FIREBASE INIT
    // ═══════════════════════════════════════════════════════════
    const firebaseConfig = window.__FIREBASE_CONFIG || {
        apiKey:            "AIzaSyD0o0Bsr8dB6goTVshvcLZqwUCraf9SDxs",
        authDomain:        "admin-panel-d762b.firebaseapp.com",
        databaseURL:       "https://admin-panel-d762b-default-rtdb.firebaseio.com",
        projectId:         "admin-panel-d762b",
        storageBucket:     "admin-panel-d762b.firebasestorage.app",
        messagingSenderId: "978340087147",
        appId:             "1:978340087147:web:030f4ded37f2e22dafb82e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ═══════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════
    let generatedKey  = "";
    let accessGranted = false;
    let turnstileOk   = false;
    let userIP        = "unknown";
    let fingerprint   = "";
    let refToken      = "";
    let countdownId   = null;
    let autoHideId    = null;

    // ═══════════════════════════════════════════════════════════
    // WEB AUDIO ENGINE — fully synthesized, no assets
    // ═══════════════════════════════════════════════════════════
    const Audio = (function () {
        let ctx = null, masterIn = null;

        function getCtx() {
            if (ctx) return ctx;
            try {
                const Ctor = window.AudioContext || window.webkitAudioContext;
                if (!Ctor) return null;
                ctx = new Ctor();
            } catch { return null; }
            return ctx;
        }

        function makeBus(ac) {
            if (masterIn) return masterIn;
            const inp = ac.createGain(); inp.gain.value = 0.85;
            const lp  = ac.createBiquadFilter(); lp.type = 'lowshelf'; lp.frequency.value = 200; lp.gain.value = 2;
            const hp  = ac.createBiquadFilter(); hp.type = 'highshelf'; hp.frequency.value = 7000; hp.gain.value = -3;
            const out = ac.createGain(); out.gain.value = 0.55;
            inp.connect(lp).connect(hp).connect(out).connect(ac.destination);
            masterIn = inp;
            return inp;
        }

        function osc(ac, bus, type, freq, vol, atk, sus, rel, detune=0) {
            try {
                const o = ac.createOscillator();
                const g = ac.createGain();
                o.type = type; o.frequency.value = freq;
                if (detune) o.detune.value = detune;
                g.gain.setValueAtTime(0, ac.currentTime);
                g.gain.linearRampToValueAtTime(vol, ac.currentTime + atk);
                g.gain.setValueAtTime(vol, ac.currentTime + atk + sus);
                g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + atk + sus + rel);
                o.connect(g).connect(bus);
                o.start(); o.stop(ac.currentTime + atk + sus + rel + 0.05);
            } catch {}
        }

        function play(fn) {
            const ac = getCtx(); if (!ac) return;
            if (ac.state === 'suspended') ac.resume();
            const bus = makeBus(ac);
            fn(ac, bus);
        }

        return {
            // tap — quick tick
            tap() { play((ac,bus) => { osc(ac,bus,'triangle',900,0.18,0.005,0,0.06); }); },
            // hover — subtle hi-freq
            hover() { play((ac,bus) => { osc(ac,bus,'sine',1200,0.07,0.005,0,0.04); }); },
            // generate — dramatic power-up
            generate() {
                play((ac,bus) => {
                    [220,330,440,660].forEach((f,i) => {
                        setTimeout(() => osc(ac,bus,'sawtooth',f,0.12,0.01,0.04,0.2), i*60);
                    });
                    setTimeout(() => osc(ac,bus,'square',880,0.08,0.01,0.02,0.15), 280);
                });

    // ═══════════════════════════════════════════════════════════
    // HAPTICS — navigator.vibrate wrapper
    // ═══════════════════════════════════════════════════════════
    const Haptics = (function () {
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        function buzz(p) { try { if (isTouch && navigator.vibrate) navigator.vibrate(p); } catch {} }
        return {
            light:   () => buzz(8),
            medium:  () => buzz(15),
            heavy:   () => buzz(30),
            tick:    () => buzz(4),
            success: () => buzz([15,25,15]),
            error:   () => buzz([40,50,40]),
            unlock:  () => buzz([20,40,20,40,60])
        };
    })();

    document.querySelectorAll('.btn-main').forEach(btn => {
        btn.addEventListener('pointerdown', e => {
            if (btn.disabled) return;
            const r = document.createElement('span');
            r.className = 'ripple';
            const rect = btn.getBoundingClientRect();
            const sz = Math.max(rect.width, rect.height);
            r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
            btn.appendChild(r);
            r.addEventListener('animationend', () => r.remove());
        });
    });

    // ═══════════════════════════════════════════════════════════
    // FINGERPRINT
    // ═══════════════════════════════════════════════════════════
    function getFingerprint() {
        const raw = [
            screen.width, screen.height, screen.colorDepth,
            Intl.DateTimeFormat().resolvedOptions().timeZone,
            navigator.userAgent, navigator.language,
            navigator.hardwareConcurrency || 0
        ].join('|');
        let h = 0;
        for (let i = 0; i < raw.length; i++) { h = ((h << 5) - h) + raw.charCodeAt(i); h |= 0; }
        return 'fp_' + Math.abs(h).toString(36);
    }

    function spawnTurnstileParticles() {
        const suc = document.getElementById('turnstileSuccess');
        if (!suc) return;
        const colors = ['#FF4500','#F59E0B','#22c55e','#ffffff'];
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'ts-particle';
            const size = 4 + Math.random() * 6;
            const angle = (Math.PI * 2 * i) / 18;
            const dist = 40 + Math.random() * 40;
            const tx = Math.cos(angle) * dist;
            const ty = Math.sin(angle) * dist;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                background:${colors[i % colors.length]};
                left:50%; top:30%;
                --tx:${tx}px; --ty:${ty}px;
                animation-duration:${0.6+Math.random()*0.4}s;
                animation-delay:${Math.random()*0.1}s;
            `;
            p.style.setProperty('--tx', tx + 'px');
            p.style.setProperty('--ty', ty + 'px');
            // inline keyframe via style
            p.animate([
                { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
            ], { duration: 700 + Math.random() * 400, easing: 'ease-out', fill: 'forwards',
                 delay: Math.random() * 100 });
            suc.appendChild(p);
            setTimeout(() => p.remove(), 1200);
        }
    }

    // ═══════════════════════════════════════════════════════════
    // MAIN INIT
    // ═══════════════════════════════════════════════════════════
    window.onload = async () => {
        initParticles();
        fingerprint = getFingerprint();

        try {
            const maintSnap = await db.ref('/Config/Maintenance').once('value');
            if (maintSnap.val() === true) {
                showBlocked("System Down", "The generator is currently under maintenance."); return;
            }

            const allowedReferrers = ['linkvertise.com','link-to.net','link-hub.net','loot-link.com','lootdest.com'];
            const ref = document.referrer.toLowerCase();
            const hasReferer = ref && allowedReferrers.some(d => ref.includes(d));

            const params = new URLSearchParams(window.location.search);
            refToken = params.get('ref') || '';

            if (refToken) {
                const tokenSnap = await db.ref('/AccessTokens/' + refToken).once('value');
                const tokenData = tokenSnap.val();
                if (!tokenData) {
                    showBlocked("Invalid Token", "This access link has expired or was already used.");
                    await logAttempt('token_invalid'); return;
                }
                if (tokenData.createdAt && (Date.now() - tokenData.createdAt > 600000)) {
                    try { await db.ref('/AccessTokens/' + refToken).remove(); } catch(e) {}
                    showBlocked("Token Expired", "This link expired. Please use the shortlink again.");
                    await logAttempt('token_expired'); return;
                }
                try { await db.ref('/AccessTokens/' + refToken).remove(); } catch(e) {}
                accessGranted = true;
            } else if (hasReferer) {
                accessGranted = true;
            } else {
                showBlocked("Access Denied", "You must use the official shortlink to access the generator.");
                await logAttempt('no_token_no_referer'); return;
            }

            try {
                const ipResp = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResp.json();
                userIP = ipData.ip;
            } catch(e) { userIP = 'unknown_' + fingerprint; }

            const rateCfgSnap = await db.ref('/Config/RateLimit').once('value');
            const rateCfg = rateCfgSnap.val();
            const rateLimitEnabled = (rateCfg && rateCfg.enabled === false) ? false : true;

            const ipKey = userIP.replace(/[\.\\:]/g, '_');
            const combinedKey = ipKey + '__' + fingerprint;
            const rateSnap = await db.ref('/RateLimits/' + combinedKey).once('value');
            const rateData = rateSnap.val() || { count: 0, timestamps: [] };
            const TWO_HOURS = 2 * 60 * 60 * 1000;
            const now = Date.now();

            const whitelistSnap = await db.ref('/Config/IPWhitelist').once('value');
            const whitelist = whitelistSnap.val() || [];
            const isWhitelisted = Array.isArray(whitelist)
                ? whitelist.includes(userIP)
                : Object.values(whitelist).includes(userIP);

            let ts = Array.isArray(rateData.timestamps) ? rateData.timestamps.filter(t => now - t < TWO_HOURS) : [];
            if (rateLimitEnabled && !isWhitelisted && ts.length >= 5) {
                const oldest = ts[0];
                const resetIn = Math.ceil((TWO_HOURS - (now - oldest)) / 60000);
                showBlocked("Rate Limited", "You've reached the maximum generations. Try again in " + resetIn + " minutes.");
                await logAttempt('rate_limited'); return;
            }

            const remaining = 5 - ts.length;
            const pill = document.getElementById('ratePill');
            const pillText = document.getElementById('rateText');
            pill.classList.remove('hidden');
            pillText.textContent = remaining + '/5 remaining today';
            pill.className = 'status-pill ' + (remaining <= 2 ? 'warn' : 'ok');

            if (sessionStorage.getItem('dg_key_generated')) {
                document.getElementById('secLoader').classList.add('hidden');
                document.getElementById('uiContainer').classList.remove('hidden');
                pill.classList.remove('hidden');
                return;
            }

            const genHistoryStr = localStorage.getItem('dg_gen_history');
            let genHistory = genHistoryStr ? JSON.parse(genHistoryStr) : [];
            genHistory = genHistory.filter(t => now - t < 60 * 60 * 1000);
            localStorage.setItem('dg_gen_history', JSON.stringify(genHistory));

            document.getElementById('secLoader').classList.add('hidden');
            document.getElementById('uiContainer').classList.remove('hidden');

            if (genHistory.length >= 3) {
                const elapsed = now - genHistory[0];
                lockGenerator(60 * 60 * 1000 - elapsed); return;
            }

            // turnstile will auto-trigger generation when ready
        } catch (err) {
            showBlocked("Connection Error", "Failed to verify access. Try again later.");
            console.error('Init error:', err);
        }
    };

    // ═══════════════════════════════════════════════════════════
    // KEY GENERATION
    // ═══════════════════════════════════════════════════════════
    async function startGeneration() {
        const keyBox = document.getElementById('keyBox');
        const loader = document.getElementById('loader');

        loader.classList.add('active');

        let scramCount = 0;
        let scrambler = setInterval(() => {
            const fake = "DG-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            keyBox.innerText = fake;
            scramCount++;
            if (scramCount % 3 === 0) Audio.scramble();
        }, 55);

        setTimeout(async () => {
            clearInterval(scrambler);

            const rnd = Math.random().toString(36).substring(2, 8).toUpperCase();
            generatedKey = "DG-" + rnd;

            try {
                const nowSec = Math.floor(Date.now() / 1000);

                await db.ref('/ValidKeys/' + generatedKey).set({
                    status:      "active",
                    expiry:      nowSec + (24 * 3600),
                    duration:    24,
                    device:      "",
                    date:        new Date().toISOString(),
                    fingerprint: fingerprint,
                    sourceIP:    userIP,
                    source:      "web"
                });

                const ipKey2 = userIP.replace(/[\.\\:]/g, '_');
                const combinedKey2 = ipKey2 + '__' + fingerprint;
                const rateSnap2 = await db.ref('/RateLimits/' + combinedKey2).once('value');
                const rateData2 = rateSnap2.val() || { count: 0, timestamps: [] };
                let ts2 = Array.isArray(rateData2.timestamps) ? rateData2.timestamps : [];
                ts2.push(Date.now());
                ts2 = ts2.filter(t => Date.now() - t < 2 * 60 * 60 * 1000);
                await db.ref('/RateLimits/' + combinedKey2).set({
                    count: ts2.length, timestamps: ts2,
                    ip: userIP, fingerprint: fingerprint,
                    lastSeen: new Date().toISOString()
                });

                const genHistoryStr = localStorage.getItem('dg_gen_history');
                let genHistory = genHistoryStr ? JSON.parse(genHistoryStr) : [];
                genHistory = genHistory.filter(t => Date.now() - t < 60 * 60 * 1000);
                genHistory.push(Date.now());
                localStorage.setItem('dg_gen_history', JSON.stringify(genHistory));

                sessionStorage.setItem('dg_key_generated', 'true');

                await logAttempt('success');
                await checkSuspicious();

                // Reveal key
                keyBox.innerText = generatedKey;
                keyBox.classList.add('revealed');
                loader.classList.remove('active');
                document.getElementById('btnOpenApp').style.display = 'flex';

                Audio.success(); Haptics.unlock();

                const pill = document.getElementById('ratePill');
                const remaining = 5 - ts2.length;
                document.getElementById('rateText').textContent = remaining + '/5 remaining today';
                pill.className = 'status-pill ' + (remaining <= 1 ? 'fail' : remaining <= 2 ? 'warn' : 'ok');

                startCountdown(10 * 60);

                autoHideId = setTimeout(() => {
                    keyBox.innerText = '•••••-••••••';
                    keyBox.style.color = 'var(--muted)';
                    keyBox.classList.remove('revealed');
                    document.getElementById('btnOpenApp').style.display = 'none';
                    showToast('Key hidden for security — already copied');
                }, 30000);

            } catch (err) {
                loader.classList.remove('active');
                keyBox.innerText = "ERROR";
                keyBox.style.color = "var(--err)";
                console.error("Gen error:", err);
                showToast('Failed to generate key. Try again.', true);
                await logAttempt('error_write');
            }
        }, 2600);
    }

    // ═══════════════════════════════════════════════════════════
    // COUNTDOWN
    // ═══════════════════════════════════════════════════════════
    function startCountdown(totalSec) {
        const el = document.getElementById('keyCountdown');
        const txt = document.getElementById('countdownText');
        el.classList.add('visible');
        el.classList.remove('expired');
        let sec = totalSec;
        function tick() {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            txt.textContent = m + ':' + (s < 10 ? '0' : '') + s;
            if (sec <= 0) {
                clearInterval(countdownId);
                txt.textContent = 'EXPIRED';
                el.classList.add('expired');
                return;
            }
            sec--;
        }
        tick();
        countdownId = setInterval(tick, 1000);
    }

            const rateData = rateSnap.val();

            const TEN_MIN = 10 * 60 * 1000;
            const recentCount = rateData.timestamps.filter(t => Date.now() - t < TEN_MIN).length;
            if (recentCount > 2) {
                await db.ref('/SuspiciousActivity/' + ipKey + '/' + Date.now()).set({
                    ip: userIP, fingerprint, count: recentCount,
                    window: '10min', time: new Date().toISOString(),
                    ua: navigator.userAgent.substring(0,150)
                });
            }
        } catch(e) { console.error('Suspicious check error:', e); }
    }

        document.body.appendChild(el); el.focus(); el.select();
        try { document.execCommand('copy'); showToast('Copied!'); }
        catch(e) { showToast('Copy failed', true); }
        document.body.removeChild(el);

                phase: Math.random() * Math.PI * 2,
                speed: 0.004 + Math.random() * 0.008,
                color: Math.random() > 0.65 ? '#FF4500' : Math.random() > 0.5 ? '#F59E0B' : '#ffffff'
            });
        }
    }

    let t = 0;

    function drawFrame() {
        const W = canvas.width, H = canvas.height;
        ctx2d.clearRect(0, 0, W, H);

        // 1. Deep space base gradient
        const bg = ctx2d.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0,   '#04010A');
        bg.addColorStop(0.4, '#07030D');
        bg.addColorStop(0.7, '#0A0208');
        bg.addColorStop(1,   '#06010A');
        ctx2d.fillStyle = bg;
        ctx2d.fillRect(0, 0, W, H);

        // 2. Nebula orbs
        NEBULA_ORBS.forEach(orb => {
            orb.phase += orb.speed;
            orb.x = orb.baseX + Math.sin(orb.phase * 1.1) * W * 0.035;
            orb.y = orb.baseY + Math.cos(orb.phase * 0.9) * H * 0.028;
            const [r,g,b] = orb.color;
            const grad = ctx2d.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r);
            grad.addColorStop(0,   `rgba(${r},${g},${b},${orb.a})`);
            grad.addColorStop(0.4, `rgba(${r},${g},${b},${orb.a * 0.5})`);
            grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
            ctx2d.fillStyle = grad;
            ctx2d.beginPath();
            ctx2d.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
            ctx2d.fill();
        });

        // 3. Aurora bands (horizontal wavy light sheets)
        AURORA_BANDS.forEach(band => {
            band.phase += band.vy * 16;
            const [r,g,b] = band.color;
            const yc = band.y * H + Math.sin(band.phase) * band.amp * H;
            const bh = H * 0.12;
            const grad = ctx2d.createLinearGradient(0, yc - bh, 0, yc + bh);
            grad.addColorStop(0,   `rgba(${r},${g},${b},0)`);
            grad.addColorStop(0.4, `rgba(${r},${g},${b},${band.a})`);
            grad.addColorStop(0.6, `rgba(${r},${g},${b},${band.a})`);
            grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);

            ctx2d.beginPath();
            ctx2d.moveTo(0, yc - bh);
            for (let x = 0; x <= W; x += 4) {
                const wave = Math.sin(x * band.freq + band.phase * 2.5) * bh * 0.35
                           + Math.sin(x * band.freq * 1.7 + band.phase) * bh * 0.15;
                ctx2d.lineTo(x, yc + wave);
            }
            ctx2d.lineTo(W, yc + bh * 2);
            ctx2d.lineTo(0, yc + bh * 2);
            ctx2d.closePath();
            ctx2d.fillStyle = grad;
            ctx2d.fill();
        });

        // 4. Stars
        STARS.forEach(s => {
            s.phase += s.speed;
            const alpha = s.a * (0.5 + 0.5 * Math.sin(s.phase));
            ctx2d.beginPath();
            ctx2d.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx2d.fillStyle = s.color;
            ctx2d.globalAlpha = alpha;
            ctx2d.fill();
        });
        ctx2d.globalAlpha = 1;

        t++;
        animId = requestAnimationFrame(drawFrame);
    }

    function initParticles() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        buildOrbs();
        buildStars();
        if (animId) cancelAnimationFrame(animId);
        drawFrame();
    }

    window.addEventListener('resize', () => {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        buildOrbs();
    });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden && animId) { cancelAnimationFrame(animId); animId = null; }
        else if (!document.hidden && !animId) drawFrame();
    });

    // unlock audio on first touch (iOS requires user gesture)
    document.addEventListener('pointerdown', () => {
        const ac = window.AudioContext || window.webkitAudioContext;
        if (!ac) return;
    }, { once: true });
    </script>
</body>
</html>
